<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Event Calendar</title>

<style>

body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:#f5f7fb;
}

header{
    background:#2563eb;
    color:white;
    padding:50px 20px;
    text-align:center;
}

h1{
    margin:0;
    font-size:38px;
}

header p{
    opacity:.9;
}

.container{

    max-width:900px;
    margin:auto;
    padding:25px;
}

.category{

    margin-top:35px;
}

.category h2{

    color:#333;
}

.card{

    background:white;
    border-radius:15px;
    padding:20px;
    margin-top:15px;

    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.card h3{

    margin-top:0;
}

.button{

display:inline-block;

margin-top:10px;

padding:12px 22px;

background:#2563eb;

color:white;

text-decoration:none;

border-radius:8px;

font-weight:bold;
}

.button:hover{

background:#1d4ed8;
}

footer{

margin-top:60px;

padding:30px;

text-align:center;

color:#666;

font-size:14px;

}

</style>

</head>

<body>

<header>

<h1>📅 Event Calendar</h1>

<p>Free calendar subscriptions for Apple Calendar, Google Calendar and Outlook</p>

</header>

<div class="container">

<div class="category">

<h2>⚽ Sports</h2>

<div class="card">

<h3>FIFA World Cup 2026</h3>

<p>Official match schedule</p>

<a class="button" href="calendars/worldcup.ics">

Add Calendar

</a>

</div>

</div>

<div class="category">

<h2>🎮 Games</h2>

<div class="card">

<h3>Coming Soon</h3>

</div>

</div>

<div class="category">

<h2>🎵 Entertainment</h2>

<div class="card">

<h3>Coming Soon</h3>

</div>

</div>

</div>

<footer>

Updated : 2026-07-05

</footer>

</body>

</html>
